<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finance Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Finance Dashboard</h1>
    <div>
      <select id="roleSelector">
        <option value="viewer">Viewer</option>
        <option value="admin">Admin</option>
      </select>
      <button id="darkModeToggle">🌙 Dark Mode</button>
    </div>
  </header>

  <main>
    
    <section id="summary">
      <div class="card" id="totalBalance">Balance: $0</div>
      <div class="card" id="income">Income: $0</div>
      <div class="card" id="expenses">Expenses: $0</div>
    </section>

    
    <section id="charts">
      <canvas id="balanceTrend"></canvas>
      <canvas id="spendingBreakdown"></canvas>
    </section>

    
    <section id="transactions">
      <h2>Transactions</h2>
      <input type="text" id="searchBox" placeholder="Search transactions...">
      <table>
        <thead>
          <tr>
            <th data-sort="date">Date</th>
            <th data-sort="amount">Amount</th>
            <th data-sort="category">Category</th>
            <th data-sort="type">Type</th>
          </tr>
        </thead>
        <tbody id="transactionList"></tbody>
      </table>
      <button id="addTransactionBtn" style="display:none;">Add Transaction</button>
    </section>

    
    <section id="insights">
      <h2>Insights</h2>
      <ul id="insightList"></ul>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
